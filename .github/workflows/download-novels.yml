# download-novels.yml - 支持手动运行的小说下载工作流
name: 下载小说（手动+自动触发）
on:
  # ✅ 核心：显示 Run workflow 按钮
  workflow_dispatch:
    inputs:
      novel_url:
        description: '小说链接（必填）'
        required: true
        type: string
      save_path:
        description: '保存路径（选填）'
        required: false
        default: './novels'
        type: string
  # 保留自动触发（不需要可以删掉）
  # push:
  #   branches: [ main ]
  # schedule:
  #   - cron: '0 0 * * *'

jobs:
  download-novel:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 运行下载脚本
        run: |
          # 替换成你实际的下载脚本命令，示例仅供参考
          python download_novel.py --url "${{ inputs.novel_url }}" --path "${{ inputs.save_path }}"
          
      - name: 上传下载结果（可选）
        uses: actions/upload-artifact@v4
        with:
          name: 下载的小说
          path: ${{ inputs.save_path }}
